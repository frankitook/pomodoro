<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/fullscreen.css">
  <title>Pomodoro Plant - Focus</title>
</head>
<body class="fullscreen-container">
  <header class="custom-titlebar draggable">
    <div class="app-title no-drag">Pomodoro Plant</div>
    <div class="window-controls no-drag">
      <button id="minimize-btn" title="Minimize">—</button>
      <button id="close-btn" title="Close">×</button>
    </div>
  </header>

  <main class="focus-content">
    <div class="plant-section">
      <img id="plant-sprite" src="assets/sprites/frame_000.png" alt="plant" draggable="false">
    </div>

    <div class="timer-section">
      <h2 id="session-label">Focus</h2>
      <div id="timer-text" class="font-mono">25:00</div>
      
      <div class="main-controls no-drag">
        <button id="start-pause-btn" class="primary-btn">Start</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>

    <div class="side-controls no-drag">
      <button id="settings-btn" title="Settings">⚙</button>
      <button id="collapse-btn" title="Widget Mode">↙</button>
    </div>
  </main>

  <!-- Settings Panel (Hidden by default) -->
  <div id="settings-panel" class="modal no-drag hidden">
    <div class="modal-content">
      <h3>Settings</h3>
      <div class="setting-item">
        <label>Focus Duration (min):</label>
        <input type="number" id="work-input" min="1" max="90" value="25">
      </div>
      <div class="setting-item">
        <label>Break Duration (min):</label>
        <input type="number" id="break-input" min="1" max="30" value="5">
      </div>
      <div class="setting-item">
        <label>Always on Top (Widget):</label>
        <input type="checkbox" id="ontop-checkbox" checked>
      </div>
      <div class="setting-item">
        <label>Enable Completion Sound:</label>
        <input type="checkbox" id="sound-checkbox" checked>
      </div>
      <div class="modal-actions">
        <button id="save-settings-btn" class="primary-btn">Save</button>
        <button id="close-settings-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/timer.js"></script>
  <script src="js/plant.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
